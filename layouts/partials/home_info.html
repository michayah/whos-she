{{- with site.Params.homeInfoParams }}
<article class="masthead">
  <div class="masthead-inner">
    <p class="masthead-label">Publication</p>
    <h1 class="masthead-title">{{ .Title }}</h1>
    <p class="masthead-tagline">{{ .Content | markdownify }}</p>
    {{- with site.Params.SocialIcons }}
    <section class="masthead-social">
      {{- partial "social_icons.html" (dict "align" "left" "icons" .) }}
    </section>
    {{- end }}
  </div>
</article>
{{- end }}
